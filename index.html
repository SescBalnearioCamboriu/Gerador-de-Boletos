<body>

<header>
  <span class="logo-badge">SESC</span>
  <h1>Gerador de Links de Boletos</h1>
</header>

<main>
  <div class="card">
    <h2 class="card-title">Acesso ao Pagamento</h2>

    <p class="card-sub">
      Informe o CPF do cliente para gerar o link de acesso ao boleto online do SESC-SC.
    </p>

    <label for="cpf">CPF do cliente</label>

    <div class="input-wrap">
      <input
        type="text"
        id="cpf"
        placeholder="Ex: 0000000000"
        autocomplete="off"
        inputmode="numeric"
        maxlength="11"
      />

      <button class="clear-btn" id="clearBtn" title="Limpar">✕</button>
    </div>

    <p class="hint">Digite apenas os números, sem pontos ou traços.</p>

    <button class="btn-gerar" onclick="gerarLink()">Gerar Link</button>

    <div class="resultado" id="resultado">
      <p class="resultado-label">Link gerado</p>

      <div class="link-box" id="linkBox"></div>

      <div class="acoes">
        <button class="btn-acao btn-copiar" onclick="copiarLink()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          Copiar link
        </button>

        <button class="btn-acao btn-abrir" onclick="abrirLink()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          Abrir
        </button>

        <button class="btn-acao btn-novo" onclick="novaConsulta()">
          ↺ Nova
        </button>
      </div>
    </div>

    <div class="historico-section" id="historicoSection">
      <p class="historico-titulo">
        <span>Recentes</span>
        <button class="limpar-hist" onclick="limparHistorico()">Limpar</button>
      </p>

      <div class="hist-lista" id="histLista"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<footer>SESC-SC · Boleto Online · Uso interno</footer>

<script>
  const BASE_LINK =
    'https://boletoonline.sesc-sc.com.br/BoletoOnline/login?TIPO=NADA&selected=CPF&CAMPO_MATRICULA=';

  let linkAtual = '';

  let historico =
    JSON.parse(localStorage.getItem('sesc_historico') || '[]');

  const input = document.getElementById('cpf');
  const clearBtn = document.getElementById('clearBtn');

  input.addEventListener('input', () => {
    input.value = input.value.replace(/\D/g, '');
    clearBtn.classList.toggle('visible', input.value.length > 0);
    input.classList.remove('erro');
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') gerarLink();
  });

  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.classList.remove('visible');
    input.focus();
  });

  function gerarLink() {
    const cpf = input.value.trim();

    if (!cpf) {
      input.classList.add('erro');
      input.focus();
      showToast('Informe o CPF antes de continuar.', true);
      return;
    }

    linkAtual = BASE_LINK + cpf;

    const linkBox = document.getElementById('linkBox');

    linkBox.innerHTML =
      `<a href="${linkAtual}" target="_blank" rel="noopener">${linkAtual}</a>`;

    document.getElementById('resultado').classList.add('visivel');

    salvarHistorico(cpf, linkAtual);
    renderHistorico();

    linkBox.scrollIntoView({
      behavior: 'smooth',
      block: 'nearest'
    });
  }

  function copiarLink() {
    if (!linkAtual) return;

    navigator.clipboard.writeText(linkAtual).then(() => {
      showToast('✓ Link copiado para a área de transferência!');
    }).catch(() => {
      const ta = document.createElement('textarea');

      ta.value = linkAtual;

      document.body.appendChild(ta);

      ta.select();

      document.execCommand('copy');

      document.body.removeChild(ta);

      showToast('✓ Link copiado!');
    });
  }

  function abrirLink() {
    if (linkAtual) {
      window.open(linkAtual, '_blank', 'noopener');
    }
  }

  function novaConsulta() {
    input.value = '';

    clearBtn.classList.remove('visible');

    document.getElementById('resultado').classList.remove('visivel');

    linkAtual = '';

    input.focus();
  }

  function salvarHistorico(cpf, link) {
    historico = historico.filter(h => h.cpf !== cpf);

    historico.unshift({
      cpf,
      link,
      ts: Date.now()
    });

    if (historico.length > 10) {
      historico = historico.slice(0, 10);
    }

    localStorage.setItem(
      'sesc_historico',
      JSON.stringify(historico)
    );
  }

  function renderHistorico() {
    const sec = document.getElementById('historicoSection');
    const lista = document.getElementById('histLista');

    if (historico.length === 0) {
      sec.classList.remove('visivel');
      return;
    }

    sec.classList.add('visivel');

    lista.innerHTML = historico.map(h => `
      <div class="hist-item">
        <span class="hist-cpf">${h.cpf}</span>

        <span
          style="
            color:var(--cinza);
            font-size:.75rem;
            flex:1;
            overflow:hidden;
            text-overflow:ellipsis;
            white-space:nowrap
          "
        >
          ${h.link}
        </span>

        <div class="hist-acoes">
          <button
            class="hist-btn"
            onclick="copiarDireto('${h.link}')"
          >
            Copiar
          </button>

          <button
            class="hist-btn"
            onclick="window.open('${h.link}','_blank','noopener')"
          >
            Abrir
          </button>
        </div>
      </div>
    `).join('');
  }

  function copiarDireto(link) {
    navigator.clipboard
      .writeText(link)
      .then(() => showToast('✓ Link copiado!'))
      .catch(() => {});
  }

  function limparHistorico() {
    historico = [];

    localStorage.removeItem('sesc_historico');

    renderHistorico();
  }

  function showToast(msg, isErro = false) {
    const t = document.getElementById('toast');

    t.textContent = msg;

    t.style.background =
      isErro ? 'var(--erro)' : 'var(--sucesso)';

    t.classList.add('show');

    setTimeout(() => {
      t.classList.remove('show');
    }, 2800);
  }

  renderHistorico();
</script>

</body>
</html>
